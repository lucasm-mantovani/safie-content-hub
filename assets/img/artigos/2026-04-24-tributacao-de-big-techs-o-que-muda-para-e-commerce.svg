<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f29"/>
      <stop offset="100%" stop-color="#04041f"/>
    </linearGradient>
    <radialGradient id="glow" cx="20%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#154EFA" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#154EFA" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Fundo navy SAFIE + glow de marca -->
  <rect width="1200" height="630" fill="url(#bg-grad)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Padrão de documentos empilhados (decoração neutra, azul SAFIE) -->
  <g stroke="#154EFA" fill="none" opacity="0.09">
    <rect x="820" y="60"  width="100" height="120" rx="2" stroke-width="0.8"/>
    <rect x="840" y="80"  width="100" height="120" rx="2" stroke-width="0.8"/>
    <rect x="860" y="100" width="100" height="120" rx="2" stroke-width="0.8"/>
    <rect x="1050" y="300" width="90" height="110" rx="2" stroke-width="0.8"/>
    <rect x="1065" y="315" width="90" height="110" rx="2" stroke-width="0.8"/>
    <rect x="1080" y="330" width="90" height="110" rx="2" stroke-width="0.8"/>
  </g>

  <!-- Documento principal estilizado -->
  <g stroke="#154EFA" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="900" y="200" width="210" height="280" rx="4"
          stroke-width="2" fill="#154EFA" fill-opacity="0.05" opacity="0.7"/>
    <polyline points="1070,200 1110,200 1110,240 1070,200"
              stroke-width="1.5" fill="#154EFA" fill-opacity="0.08" opacity="0.6"/>
    <line x1="924" y1="260" x2="1086" y2="260" stroke-width="1.2" opacity="0.45"/>
    <line x1="924" y1="280" x2="1086" y2="280" stroke-width="1.2" opacity="0.40"/>
    <line x1="924" y1="300" x2="1086" y2="300" stroke-width="1.2" opacity="0.40"/>
    <line x1="924" y1="320" x2="1040" y2="320" stroke-width="1.2" opacity="0.35"/>
    <line x1="924" y1="350" x2="1086" y2="350" stroke-width="1" opacity="0.30"/>
    <line x1="924" y1="365" x2="1086" y2="365" stroke-width="1" opacity="0.30"/>
    <line x1="924" y1="380" x2="1070" y2="380" stroke-width="1" opacity="0.25"/>
    <rect x="924" y="217" width="136" height="24" rx="2"
          stroke-width="1" fill="#154EFA" fill-opacity="0.10" opacity="0.5"/>
  </g>

  <!-- Logo — canto superior esquerdo -->
  <rect x="52" y="40" width="10" height="10" fill="#154EFA"/>
  <text x="68" y="51" fill="#ffffff"
        font-family="'General Sans', Arial, sans-serif" font-size="15" font-weight="600">SAFIE Blog</text>

  <!-- Categoria e data -->
  <text x="52" y="210" fill="#154EFA"
        font-family="'Inter', Arial, sans-serif" font-size="12" font-weight="600" letter-spacing="3">MARKETPLACES E PLATAFORMAS DIGITAIS · 24 ABR 2026</text>

  <!-- Título — 3 linhas -->
  <text x="52" y="286" fill="#ffffff"
        font-family="Georgia, 'Times New Roman', serif" font-size="50" font-weight="700">Tributação de Big</text>
  <text x="52" y="352" fill="#ffffff"
        font-family="Georgia, 'Times New Roman', serif" font-size="50" font-weight="700">Techs: o que muda</text>
  <text x="52" y="418" fill="#154EFA"
        font-family="Georgia, 'Times New Roman', serif" font-size="50" font-weight="700">para e-commerce</text>

  <!-- Barra de destaque — canto inferior esquerdo -->
  <rect x="52" y="572" width="64" height="4" fill="#154EFA"/>
</svg>
