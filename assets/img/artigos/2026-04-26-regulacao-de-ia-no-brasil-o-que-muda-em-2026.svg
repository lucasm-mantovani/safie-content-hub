<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0a1a"/>
      <stop offset="100%" stop-color="#1a1428"/>
    </linearGradient>
  </defs>

  <!-- Fundo com gradiente -->
  <rect width="1200" height="630" fill="url(#bg-grad)"/>

  <!-- Circunferências concêntricas (padrão de fundo) -->
  <g stroke="#a78bfa" fill="none">
    <circle cx="1020" cy="315" r="60"  stroke-width="0.6" opacity="0.12"/>
    <circle cx="1020" cy="315" r="120" stroke-width="0.6" opacity="0.10"/>
    <circle cx="1020" cy="315" r="185" stroke-width="0.6" opacity="0.08"/>
    <circle cx="1020" cy="315" r="255" stroke-width="0.5" opacity="0.06"/>
    <circle cx="1020" cy="315" r="330" stroke-width="0.5" opacity="0.05"/>
    <circle cx="1020" cy="315" r="410" stroke-width="0.4" opacity="0.04"/>
  </g>

  <!-- Conexões entre nodos (rede neural) -->
  <g stroke="#a78bfa" stroke-width="0.9" opacity="0.28" fill="none">
    <!-- Nodo central para adjacentes -->
    <line x1="1020" y1="315" x2="920"  y2="220"/>
    <line x1="1020" y1="315" x2="1120" y2="220"/>
    <line x1="1020" y1="315" x2="920"  y2="410"/>
    <line x1="1020" y1="315" x2="1120" y2="410"/>
    <line x1="1020" y1="315" x2="860"  y2="315"/>
    <line x1="1020" y1="315" x2="1180" y2="315"/>
    <line x1="1020" y1="315" x2="1020" y2="155"/>
    <line x1="1020" y1="315" x2="1020" y2="475"/>
    <!-- Adjacentes entre si -->
    <line x1="920"  y1="220" x2="1120" y2="220"/>
    <line x1="920"  y1="410" x2="1120" y2="410"/>
    <line x1="920"  y1="220" x2="860"  y2="315"/>
    <line x1="920"  y1="410" x2="860"  y2="315"/>
    <line x1="1120" y1="220" x2="1180" y2="315"/>
    <line x1="1120" y1="410" x2="1180" y2="315"/>
    <line x1="1020" y1="155" x2="920"  y2="220"/>
    <line x1="1020" y1="155" x2="1120" y2="220"/>
    <line x1="1020" y1="475" x2="920"  y2="410"/>
    <line x1="1020" y1="475" x2="1120" y2="410"/>
    <!-- Nodos periféricos -->
    <line x1="860"  y1="315" x2="800"  y2="230"/>
    <line x1="860"  y1="315" x2="800"  y2="400"/>
    <line x1="1180" y1="315" x2="1200" y2="240"/>
    <line x1="1020" y1="155" x2="960"  y2="95"/>
    <line x1="1020" y1="155" x2="1080" y2="95"/>
    <line x1="1020" y1="475" x2="960"  y2="535"/>
    <line x1="1020" y1="475" x2="1080" y2="535"/>
  </g>

  <!-- Nodos da rede neural -->
  <!-- Nodo central — principal -->
  <circle cx="1020" cy="315" r="11" fill="#a78bfa" opacity="0.85"/>
  <circle cx="1020" cy="315" r="22" fill="none" stroke="#a78bfa" stroke-width="1.2" opacity="0.35"/>
  <circle cx="1020" cy="315" r="35" fill="none" stroke="#a78bfa" stroke-width="0.8" opacity="0.18"/>

  <!-- Nodos de segundo nível -->
  <circle cx="920"  cy="220" r="7" fill="#a78bfa" opacity="0.65"/>
  <circle cx="1120" cy="220" r="7" fill="#a78bfa" opacity="0.65"/>
  <circle cx="920"  cy="410" r="7" fill="#a78bfa" opacity="0.65"/>
  <circle cx="1120" cy="410" r="7" fill="#a78bfa" opacity="0.65"/>
  <circle cx="860"  cy="315" r="7" fill="#a78bfa" opacity="0.65"/>
  <circle cx="1180" cy="315" r="7" fill="#a78bfa" opacity="0.60"/>
  <circle cx="1020" cy="155" r="7" fill="#a78bfa" opacity="0.65"/>
  <circle cx="1020" cy="475" r="7" fill="#a78bfa" opacity="0.65"/>

  <!-- Nodos periféricos menores -->
  <circle cx="800"  cy="230" r="4" fill="#a78bfa" opacity="0.45"/>
  <circle cx="800"  cy="400" r="4" fill="#a78bfa" opacity="0.45"/>
  <circle cx="960"  cy="95"  r="4" fill="#a78bfa" opacity="0.40"/>
  <circle cx="1080" cy="95"  r="4" fill="#a78bfa" opacity="0.40"/>
  <circle cx="960"  cy="535" r="4" fill="#a78bfa" opacity="0.40"/>
  <circle cx="1080" cy="535" r="4" fill="#a78bfa" opacity="0.40"/>

  <!-- Logo — canto superior esquerdo -->
  <rect x="52" y="40" width="10" height="10" fill="#a78bfa"/>
  <text x="68" y="51" fill="#ffffff"
        font-family="'DM Sans', Arial, sans-serif" font-size="15" font-weight="600">SAFIE IA for Business</text>

  <!-- Categoria e data -->
  <text x="52" y="210" fill="#a78bfa"
        font-family="'DM Sans', Arial, sans-serif" font-size="12" font-weight="600" letter-spacing="3">REGULAÇÃO DE IA NO BRASIL · 26 ABR 2026</text>

  <!-- Título — linha 1 -->
  <text x="52" y="286" fill="#ffffff"
        font-family="Georgia, 'Times New Roman', serif" font-size="50" font-weight="700">Regulação de IA no</text>
  <!-- Título — linha 2 -->
  <text x="52" y="352" fill="#a78bfa"
        font-family="Georgia, 'Times New Roman', serif" font-size="50" font-weight="700">Brasil: o que muda em 2026</text>
  <!-- Título — linha 3 (última linha fica na cor de destaque) -->
  <text x="52" y="418" fill="#a78bfa"
        font-family="Georgia, 'Times New Roman', serif" font-size="50" font-weight="700"></text>

  <!-- Barra de destaque — canto inferior esquerdo -->
  <rect x="52" y="572" width="64" height="4" fill="#a78bfa"/>
</svg>
