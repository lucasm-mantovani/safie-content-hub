name: Atualizar últimos posts

on:
  schedule:
    - cron: '0 12 * * *'  # 9h BRT (UTC-3 → 12h UTC)
  workflow_dispatch:       # permite rodar manualmente no GitHub

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Executar fetch_posts.py
        run: python3 scripts/fetch_posts.py

      - name: Commit e push se houver mudanças
        run: |
          git config user.name "safie-bot"
          git config user.email "bot@safie.com.br"
          git add data/ultimos_posts.json
          git diff --staged --quiet || git commit -m "auto: atualizar últimos posts $(date +%Y-%m-%d)"
          git push
